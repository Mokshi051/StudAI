<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>StudAI — Mental Health & Wellness</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#1a2740;--accent:#22c55e;--text:#1f2a44;--muted:#64748b;--glass-strong:rgba(255,255,255,0.46);--glass-border:rgba(255,255,255,0.55);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:#b5eeeb;min-height:100vh;color:var(--text);overflow-x:hidden;}
    .bg-orbs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
    .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.55;animation:drift 18s ease-in-out infinite;}
    .orb-1{width:520px;height:520px;background:#a8edea;top:-160px;left:-120px;}.orb-2{width:440px;height:440px;background:#fed6e3;top:35%;right:-100px;animation-delay:-6s;}.orb-3{width:320px;height:320px;background:#bbf7d0;bottom:-80px;left:35%;animation-delay:-11s;}
    @keyframes drift{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(28px,-18px) scale(1.04);}66%{transform:translate(-18px,26px) scale(0.97);}}
    nav{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:66px;background:var(--navy);box-shadow:0 2px 24px rgba(0,0,0,0.2);}
    .nav-logo{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#fff;}.nav-logo span{color:#a8edea;}
    .nav-links{display:flex;gap:10px;}
    .nav-link{font-size:13px;color:rgba(255,255,255,0.75);text-decoration:none;background:rgba(255,255,255,0.1);padding:6px 14px;border-radius:20px;transition:background 0.2s;}
    .nav-link:hover{background:rgba(255,255,255,0.2);}
    .page{position:relative;z-index:1;padding:0 20px 64px;}
    .page-hero{text-align:center;padding:44px 20px 28px;}
    .page-hero h1{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;color:var(--navy);margin-bottom:8px;letter-spacing:-0.8px;}
    .page-hero p{font-size:14.5px;color:var(--muted);}
    .container{max-width:820px;margin:0 auto;}
    /* Picker */
    .picker{background:var(--glass-strong);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid var(--glass-border);border-radius:20px;padding:26px 28px;margin-bottom:20px;box-shadow:0 8px 32px rgba(0,0,0,0.08);display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
    .picker-label{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--navy);white-space:nowrap;}
    .tab-group{display:flex;gap:8px;flex-wrap:wrap;}
    .tab{padding:8px 18px;border-radius:50px;border:1.5px solid rgba(0,0,0,0.1);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;background:rgba(255,255,255,0.6);color:var(--muted);}
    .tab:hover{background:rgba(255,255,255,0.85);}
    .tab.active-low{background:#22c55e;border-color:#22c55e;color:white;}
    .tab.active-mod{background:#f97316;border-color:#f97316;color:white;}
    .tab.active-high{background:#ec4899;border-color:#ec4899;color:white;}
    .section-label{font-size:10.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--navy);opacity:0.45;margin:0 0 14px;}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;margin-bottom:20px;}
    .tip-card{background:var(--glass-strong);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:1px solid var(--glass-border);border-radius:18px;padding:22px;box-shadow:0 6px 24px rgba(0,0,0,0.07);animation:slideUp 0.4s ease both;}
    @keyframes slideUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
    .tip-card:nth-child(2){animation-delay:0.06s;}.tip-card:nth-child(3){animation-delay:0.12s;}.tip-card:nth-child(4){animation-delay:0.18s;}.tip-card:nth-child(5){animation-delay:0.24s;}.tip-card:nth-child(6){animation-delay:0.30s;}
    .tip-icon{font-size:30px;margin-bottom:12px;display:block;}
    .tip-card h3{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--navy);margin-bottom:7px;}
    .tip-card p{font-size:13.5px;color:var(--muted);line-height:1.65;margin-bottom:10px;}
    .tip-item{background:rgba(255,255,255,0.5);border-radius:8px;padding:7px 11px;margin-top:6px;font-size:12.5px;display:flex;gap:7px;align-items:flex-start;}
    .tip-dot{flex-shrink:0;width:6px;height:6px;border-radius:50%;background:#22c55e;margin-top:5px;}
    .tip-dot.orange{background:#f97316;}.tip-dot.pink{background:#ec4899;}
  </style>
</head>
<body>
  <div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
  <nav>
    <div class="nav-logo">Stud<span>AI</span></div>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-link">← Dashboard</a>
      <a href="burnout_dashboard.html" class="nav-link">Burnout Dashboard</a>
    </div>
  </nav>
  <div class="page">
    <div class="page-hero">
      <h1>Mental Health & Wellness</h1>
      <p>Personalised recommendations based on your current burnout status</p>
    </div>
    <div class="container">
      <div class="picker">
        <span class="picker-label">My status:</span>
        <div class="tab-group">
          <button class="tab" id="tab-low" onclick="setStatus('low')">😊 Low Risk</button>
          <button class="tab active-mod" id="tab-moderate" onclick="setStatus('moderate')">⚠ Moderate</button>
          <button class="tab" id="tab-high" onclick="setStatus('high')">🚨 High Risk</button>
        </div>
      </div>
      <div class="section-label" id="tipsLabel">Recommendations for Moderate Risk</div>
      <div class="grid" id="tipsGrid"></div>
    </div>
  </div>
  <script>
    const tips={
      low:[
        {icon:"😴",title:"Keep Up Your Sleep",text:"You're doing great! Maintain 7–9 hours per night.",items:["Stick to a consistent bedtime","Avoid screens 30 min before bed"],dot:""},
        {icon:"💧",title:"Stay Hydrated",text:"Drink at least 8 glasses of water daily to stay focused.",items:["Keep a water bottle at your desk","Set hourly hydration reminders"],dot:""},
        {icon:"🏃",title:"Stay Active",text:"A 20-minute walk or workout boosts memory and focus.",items:["Try a morning stretch routine","Walk between study sessions"],dot:""},
        {icon:"📖",title:"Keep Reflecting",text:"Journal weekly to track your emotions and progress.",items:["Write 3 things you're grateful for","Note what went well this week"],dot:""},
      ],
      moderate:[
        {icon:"⏱️",title:"Pomodoro Technique",text:"Study in 25-minute focused blocks with 5-minute breaks.",items:["Use a timer app","Step away from your desk on breaks"],dot:"orange"},
        {icon:"😴",title:"Prioritise Sleep",text:"You may be running low — aim for 7–8 hours tonight.",items:["Avoid caffeine after 2 PM","Wind down with light reading"],dot:"orange"},
        {icon:"🧘",title:"Try Mindfulness",text:"Even 5 minutes of breathing exercises reduces cortisol.",items:["Try the 4-7-8 breathing technique","Use Headspace or Calm"],dot:"orange"},
        {icon:"📋",title:"Lighten Your Load",text:"Identify low-priority tasks you can defer this week.",items:["Use the Eisenhower matrix","Talk to a peer about sharing work"],dot:"orange"},
        {icon:"🤝",title:"Talk to Someone",text:"Connecting with friends or a counsellor really helps.",items:["Call a friend today","Check for free college counselling"],dot:"orange"},
        {icon:"💧",title:"Hydrate & Eat Well",text:"Burnout drains your body too — fuel it properly.",items:["Eat a balanced breakfast","Avoid skipping meals before deadlines"],dot:"orange"},
      ],
      high:[
        {icon:"🚨",title:"Take a Break — Now",text:"Your burnout risk is high. Rest is productive, not lazy.",items:["Take at least one full rest day this week","Inform professors if needed"],dot:"pink"},
        {icon:"💬",title:"Seek Support",text:"Please talk to a trusted friend, family member, or counsellor.",items:["Reach out to student support","iCall India: 9152987821"],dot:"pink"},
        {icon:"😴",title:"Sleep is Non-Negotiable",text:"Your mind cannot recover without adequate sleep.",items:["Aim for 8–9 hours tonight","Nap if exhausted — 20 min max"],dot:"pink"},
        {icon:"📵",title:"Digital Detox",text:"Step away from screens for a few hours each day.",items:["No phone in the bedroom","Designate offline hours in the evening"],dot:"pink"},
        {icon:"🧘",title:"Gentle Movement",text:"Light yoga or a slow walk can ease mental exhaustion.",items:["Try a 10-minute yoga video","Walk in nature if possible"],dot:"pink"},
        {icon:"✂️",title:"Cut Down Tasks",text:"Use your planner to remove or defer non-essential work.",items:["Focus only on truly urgent tasks","Ask for deadline extensions if overwhelmed"],dot:"pink"},
      ]
    };
    const labels={low:"You're in good shape — keep it up!",moderate:"Recommendations for Moderate Risk",high:"Urgent Care — High Burnout Risk"};
    let currentStatus='moderate';
    function setStatus(s){
      currentStatus=s;
      ['low','moderate','high'].forEach(k=>{
        const tab=document.getElementById('tab-'+k);
        tab.className='tab'+(s===k?' active-'+(k==='moderate'?'mod':k):'');
      });
      document.getElementById('tipsLabel').textContent=labels[s];
      renderTips(s);
    }
    function renderTips(s){
      const grid=document.getElementById('tipsGrid');grid.innerHTML='';
      tips[s].forEach((t,i)=>{
        const card=document.createElement('div');card.className='tip-card';card.style.animationDelay=(i*0.06)+'s';
        const itemsHtml=t.items.map(item=>`<div class="tip-item"><span class="tip-dot ${t.dot}"></span><span>${item}</span></div>`).join('');
        card.innerHTML=`<span class="tip-icon">${t.icon}</span><h3>${t.title}</h3><p>${t.text}</p>${itemsHtml}`;
        grid.appendChild(card);
      });
    }
    setStatus('moderate');
  </script>
</body>
</html>
